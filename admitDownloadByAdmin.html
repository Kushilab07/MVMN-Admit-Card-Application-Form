<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVM Admin Portal - Examination Control</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Roboto:wght@400;500;700&family=Libre+Barcode+39&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

    <style>
        /* --- ORIGINAL ADMIT CARD VARIABLES & CSS (STRICTLY PRESERVED) --- */
        :root {
            --school-blue: #00008B;
            --admit-green: #006400;
            --exam-red: #990000;
            --table-head: #00004d;

            /* Admin Specific Vars */
            --admin-dark: #1a1f36;
            --admin-blue: #3c4fe0;
            --admin-bg: #f7f9fc;
        }

        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
            background: var(--admin-bg);
            /* Admin Background */
            min-height: 100vh;
        }

        /* =========================================
           ADMIN UI STYLES (Screen Only)
           ========================================= */

        .admin-container {
            max-width: 1000px;
            margin: 0 auto;
            padding-bottom: 50px;
        }

        /* Login Modal */
        .login-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, var(--admin-dark) 0%, #2c3e50 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10000;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
        }

        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: var(--admin-blue);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        /* Dashboard */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .admin-title h1 {
            margin: 0;
            font-family: 'Montserrat';
            color: var(--admin-dark);
            font-size: 20px;
        }

        .logout-btn {
            color: #e74c3c;
            cursor: pointer;
            font-weight: bold;
            text-decoration: underline;
        }

        .search-panel {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .search-row {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            flex: 1;
            padding: 15px;
            border: 2px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        .search-btn {
            padding: 15px 30px;
            background: var(--school-blue);
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Status & Action Area */
        .result-panel {
            background: white;
            margin-top: 20px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .result-header {
            background: #f0f2f5;
            padding: 20px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-tag {
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
        }

        .tag-active {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .tag-block {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .tag-hold {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .admin-actions {
            padding: 20px;
            text-align: right;
        }

        .override-msg {
            float: left;
            color: #666;
            font-size: 13px;
            margin-top: 8px;
            font-style: italic;
        }

        .print-admin-btn {
            background: var(--admit-green);
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        /* =========================================
           STRICT ADMIT CARD CSS (FROM ORIGINAL)
           ========================================= */

        .page-container {
            width: 210mm;
            margin: 20px auto;
            display: none;
            /* Hidden until search */
        }

        /* EXACT CLASSES FROM ORIGINAL CODE */
        .admit-card-page,
        .instructions-page {
            background: white;
            padding: 12mm;
            min-height: 80vh;
            box-sizing: border-box;
            border: 3px solid var(--school-blue);
            position: relative;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            overflow: hidden;
            z-index: 1;
        }

        .page-background-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('logo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 400px;
            opacity: 0.10;
            z-index: -1;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid #000;
            padding-bottom: 10px;
            margin-bottom: 20px;
            position: relative;
            z-index: 5;
            background: white;
        }

        .logo-h {
            width: 115px;
            height: 115px;
            object-fit: contain;
            filter: contrast(1.2) brightness(0.9);
        }

        .header-text {
            text-align: center;
            flex: 1;
        }

        .header-text h1 {
            margin: 0;
            color: var(--school-blue);
            font-size: 26px;
            font-family: 'Montserrat';
            font-weight: 800;
            line-height: 1.1;
        }

        .header-text .sub-1 {
            font-size: 13px;
            font-weight: 700;
            margin: 5px 0;
            color: #000;
        }

        .header-text .admit-title {
            color: var(--admit-green);
            font-size: 26px;
            font-weight: 800;
            margin: 5px 0;
            letter-spacing: 2px;
        }

        .header-text .exam-title {
            color: var(--exam-red);
            font-size: 20px;
            font-weight: 700;
            margin: 0;
        }

        .content-flex {
            display: flex;
            gap: 20px;
            margin-top: 15px;
            position: relative;
            z-index: 1;
        }

        .details-area {
            flex: 1;
        }

        .details-table {
            width: 100%;
            border-collapse: collapse;
        }

        .details-table td {
            padding: 11px 5px;
            border-bottom: 1px solid #ccc;
            font-size: 16px;
            color: #000;
        }

        .lbl {
            font-weight: 800;
            color: var(--school-blue);
            width: 160px;
        }

        .val {
            font-weight: 800;
        }

        .photo-area {
            text-align: center;
            width: 160px;
        }

        .photo-box {
            width: 150px;
            height: 180px;
            border: 2px solid #000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #000;
            font-weight: bold;
            padding: 5px;
            text-align: center;
            background: #fff;
        }

        .photo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .issued-under-photo {
            font-size: 9px;
            font-weight: 900;
            color: #000;
            margin-top: 5px;
        }

        .barcode-section {
            text-align: center;
            margin: 15px 0;
            position: relative;
            z-index: 1;
        }

        .barcode-disp {
            font-family: 'Libre Barcode 39', cursive;
            font-size: 65px;
            color: #000;
            line-height: 1;
            height: 65px;
            white-space: nowrap;
        }

        .exam-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            z-index: 1;
        }

        .exam-table th {
            background: var(--table-head);
            color: white;
            padding: 12px;
            font-size: 13px;
            border: 1px solid #000;
        }

        .exam-table td {
            border: 1px solid #000;
            padding: 10px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.4);
        }

        .footer-sigs {
            display: flex;
            justify-content: space-between;
            margin-top: 10px;
            padding-top: 45px;
            position: relative;
            z-index: 1;
        }

        .sig-item {
            text-align: center;
            width: 230px;
        }

        .sig-img {
            height: 60px;
            margin-bottom: 5px;
            object-fit: contain;
        }

        .sig-line {
            border-top: 2px solid #000;
            padding-top: 5px;
            font-weight: bold;
            font-size: 14px;
            color: #000;
        }

        .page-timestamp-footer {
            text-align: center;
            font-size: 11px;
            font-weight: bold;
            padding-top: 10px;
            color: #000;
            position: relative;
            z-index: 1;
            border-top: 1px solid #000;
            margin-top: 15px;
        }

        /* PRINT STYLES - STRICTLY ORIGINAL */
        @media print {

            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }

            body {
                padding: 0;
                background: white;
                margin: 0;
            }

            /* Hide Admin UI */
            .admin-container,
            .login-overlay {
                display: none !important;
            }

            /* Show Admit Card */
            .page-container {
                display: block !important;
                width: 100%;
                margin: 0;
            }

            .admit-card-page,
            .instructions-page {
                border: 1px solid #000 !important;
                height: 80vh; /*!important; / * 2. Dynamically stretches the border to perfectly fit Legal, A4, or Letter */
                page-break-after: always;
                box-shadow: none;
                margin: 0;
                width: 100%;
            }
        }
    </style>
</head>

        function formatDate(dStr) {
            if (!dStr) return '';
            const d = new Date(dStr);
            return `${String(d.getDate()).padStart(2, '0')}-${String(d.getMonth() + 1).padStart(2, '0')}-${d.getFullYear()}`;
        }

        // RENDER ADMIT CARD (STRICTLY ORIGINAL HTML)
        function renderCard(data) {
            const now = new Date();
            const issuedTime = now.toLocaleString('en-GB', { hour12: false });
            const serialNumber = data['Serial Number'] || '';
            const barcodeID = `*${serialNumber}*`;

            let rows = '';
            for (let i = 1; i <= 10; i++) {
                if (data[`Date ${i}`]) {
                    rows += `<tr><td>${formatDate(data[`Date ${i}`])}</td><td>${data[`Paper ${i}`]}</td><td></td><td></td></tr>`;
                }
            }

            // Using the EXACT HTML Template from original request
            const html = `
                <div class="admit-card-page">
                    <div class="page-background-overlay"></div>
                    
                    <header class="header">
                        <img src="logo.png" class="logo-h">
                        <div class="header-text">
                            <h1>MAHARISHI VIDYA MANDIR,<br>NALBARI</h1>
                            <p class="sub-1">CBSE CURRICULUM • BATIRAM ROAD, NALBARI, PIN-781335</p>
                            <p class="admit-title">ADMIT CARD</p>
                            <p class="exam-title">FINAL EXAMINATION 2025-2026</p>
                        </div>
                        <img src="logo.png" class="logo-h">
                    </header>

                    <div class="content-flex">
                        <div class="details-area">
                            <table class="details-table">
                                <tr><td class="lbl">Student Name</td><td class="val">${data['Student Name']}</td></tr>
                                <tr><td class="lbl">Father's Name</td><td class="val">${data["Father's Name"]}</td></tr>
                                <tr><td class="lbl">Student ID</td><td class="val">${data['Student ID']}</td></tr>
                                <tr><td class="lbl">Class & Section</td><td class="val">${data['Class']} - ${data['Section']}</td></tr>
                                <tr><td class="lbl">Roll Number</td><td class="val">${data['Roll No']}</td></tr>
                            </table>
                        </div>
                        <div class="photo-area">
                            <div class="photo-box">
                                ${data['Photo URL'] ? `<img src="${data['Photo URL']}">` : 'Affix recent passport size photograph in school uniform'}
                            </div>
                            <div class="issued-under-photo">Issued: ${issuedTime}</div>
                        </div>
                    </div>

                    <div class="barcode-section">
                        <div class="barcode-disp">${barcodeID}</div>
                    </div>

                    <table class="exam-table">
                        <thead><tr><th>Date</th><th>Subject / Paper</th><th>Student Sig.</th><th>Invigilator Sig.</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>

                    <footer class="footer-sigs">
                        <div class="sig-item">
                            ${data['Signature URL'] ? `<img src="${data['Signature URL']}" class="sig-img">` : '<div style="height:60px"></div>'}
                            <div class="sig-line">Student's Signature</div>
                        </div>
                        <div class="sig-item" style="text-align: left; font-size: 11px; font-weight: 800; line-height: 1.4;">
                            <img src="sign.png" class="sig-img" style="display: block; margin-left: 0;">
                            PRINCIPAL<br>
                            MVM NALBARI<br>
                            Date: ${issuedTime}<br>
                            Location: Nalbari, Assam
                        </div>
                    </footer>
                </div>

                <div class="instructions-page">
                    <div class="page-background-overlay"></div>
                    <h2 style="color: var(--school-blue); text-align: center; text-decoration: underline;">EXAMINATION INSTRUCTIONS</h2>
                    <ol style="line-height: 2.2; font-size: 15px; margin-top: 15px; color: #000; font-weight: 700; padding-left: 25px; position: relative; z-index: 1;">
                        <li>On all examination days, students must carry their Admit Card. Without the admit card, entry into the examination hall will not be permitted.</li>
                        <li>Students must reach the school at least 15 minutes before the reporting time. Late entry after the seating time will not be allowed.</li>
                        <li>Carrying electronic devices such as mobile phones, smartwatches, calculators, or any other gadgets inside the examination hall is strictly prohibited.</li>
                        <li>No candidate shall adopt or indulge in unfair means or malpractices during the examination. If found guilty, the candidature will be cancelled and legal action will be taken.</li>
                        <li>Students must maintain silence and discipline inside the examination hall. Any misconduct will lead to immediate disqualification.</li>
                        <li>Do not write anything on the question paper or admit card, except where signatures are required.</li>
                        <li>The admit card must clearly display all student details, the barcode, and the principal's signature. Admit cards without these will not be accepted.</li>
                        <li>Students must verify all details carefully before printing the admit card. In case of any errors, immediately inform the school administration.</li>
                    </ol>
                    <div style="margin-top: auto; position: relative; z-index: 1;">

                    </div>
                </div>
