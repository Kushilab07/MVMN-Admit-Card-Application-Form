<!DOCTYPE html>
<html lang="en" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Management System - Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #334155;
        }

        /* Loading Spinner Animation */
        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 h-screen flex overflow-hidden">

    <div id="toast-container"
        class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 w-full max-w-sm pointer-events-none"></div>

    <aside
        class="w-[10%] min-w-[80px] bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col transition-colors duration-300 flex-shrink-0">
        <div class="h-16 flex items-center justify-center border-b border-slate-200 dark:border-slate-800">
            <div
                class="flex items-center gap-2 text-blue-600 dark:text-blue-500 font-bold tracking-tight text-sm lg:text-base">
                <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                <span class="hidden xl:block">MVM Admin</span>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto scrollbar-hide py-4 px-2 flex flex-col gap-2 items-center xl:items-stretch">
            <a href="#"
                class="flex items-center xl:justify-start justify-center gap-3 px-3 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors font-medium text-sm group">
                <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:text-blue-600 transition-colors"></i> <span
                    class="hidden xl:block">Dashboard</span>
            </a>
            <a href="#"
                class="flex items-center xl:justify-start justify-center gap-3 px-3 py-3 rounded-xl bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 font-medium text-sm transition-colors">
                <i data-lucide="file-text" class="w-5 h-5"></i> <span class="hidden xl:block">Applications</span>
            </a>
            <a href="#"
                class="flex items-center xl:justify-start justify-center gap-3 px-3 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors font-medium text-sm group">
                <i data-lucide="settings" class="w-5 h-5 group-hover:text-blue-600 transition-colors"></i> <span
                    class="hidden xl:block">Settings</span>
            </a>
        </nav>
    </aside>

    <main
        class="w-[90%] flex flex-col h-screen overflow-hidden bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

        <header
            class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center px-8 flex-shrink-0 transition-colors duration-300">
            <h1 class="font-semibold text-lg text-slate-800 dark:text-white">Live Verification</h1>
            <div class="flex items-center gap-5">
                <button class="relative text-slate-500 hover:text-blue-600 transition-colors focus:outline-none">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span id="notificationBadge" class="hidden absolute -top-1 -right-1 flex h-2.5 w-2.5">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                    </span>
                </button>

                <button id="theme-toggle"
                    class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all border border-slate-200 dark:border-slate-700 focus:outline-none">
                    <i data-lucide="moon" class="w-5 h-5 text-slate-600 dark:text-slate-400 block dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 text-amber-500 hidden dark:block"></i>
                </button>
                <div
                    class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-md cursor-pointer">
                    A</div>
            </div>
        </header>

        <div class="flex-1 flex flex-col p-8 overflow-hidden">
            <div class="flex justify-between items-end mb-6 flex-shrink-0">
                <div>
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white">Pending Applications</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 hover-instruction">Hover over fields to
                        edit details.</p>
                </div>
                <button onclick="fetchData()" id="refreshBtn"
                    class="flex items-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-300 px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-sm">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="refreshIcon"></i> Refresh
                </button>
            </div>

            <div
                class="flex-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm flex flex-col min-h-0 overflow-hidden transition-colors duration-300 relative">
                <div id="newDataAlert"
                    class="hidden flex justify-center w-full absolute top-8 left-0 z-40 pointer-events-none">
                    <button onclick="loadNewData()"
                        class="pointer-events-auto flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full shadow-lg font-medium text-sm transition-transform transform translate-y-0 hover:-translate-y-1">
                        <i data-lucide="arrow-up" class="w-4 h-4"></i>
                        <span id="newDataText">1 New Application</span>
                    </button>
                </div>
                <div class="flex-1 overflow-x-auto overflow-y-auto scrollbar-hide relative">
                    <table class="w-full text-left border-collapse min-w-max">
                        <thead class="sticky top-0 z-20 bg-slate-50/95 dark:bg-slate-800/95 backdrop-blur shadow-sm">
                            <tr
                                class="border-b border-slate-200 dark:border-slate-800 text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400 font-semibold">
                                <th class="px-4 py-3">Date & Time</th>
                                <th class="px-4 py-3">Application ID</th>
                                <th class="px-4 py-3">Student ID</th>
                                <th class="px-4 py-3">Student Name</th>
                                <th class="px-4 py-3">Class</th>
                                <th class="px-4 py-3">Section</th>
                                <th class="px-4 py-3">Roll No</th>
                                <th class="px-4 py-3">Date of Birth</th>
                                <th class="px-4 py-3">Father's Name</th>
                                <th class="px-4 py-3">Phone Number</th>
                                <th class="px-4 py-3 border-r border-slate-200 dark:border-slate-800">Email ID</th>
                                <th
                                    class="px-4 py-3 text-center sticky right-0 z-30 bg-slate-50/95 dark:bg-slate-800/95 backdrop-blur shadow-[-4px_0_10px_rgba(0,0,0,0.05)] w-[120px]">
                                    Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-200 dark:divide-slate-800 text-sm">
                            <tr>
                                <td colspan="12" class="px-4 py-12 text-center text-slate-500">Loading applications...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
    <script src="admin.js"></script>
</body>

</html>
