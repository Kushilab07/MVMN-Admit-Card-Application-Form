<!DOCTYPE html>
<html lang="en" class="antialiased">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Management System - Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }

        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark')
        } else {
            document.documentElement.classList.remove('dark')
        }
    </script>

    <style>
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }

        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }

        .dark .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #334155;
        }

        .spin {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body
    class="bg-slate-50 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 h-screen flex overflow-hidden">

    <div id="toast-container"
        class="fixed top-6 right-6 z-[9999] flex flex-col gap-3 w-full max-w-sm pointer-events-none"></div>

    <aside
        class="w-[10%] min-w-[80px] bg-white dark:bg-slate-900 border-r border-slate-200 dark:border-slate-800 flex flex-col transition-colors duration-300 flex-shrink-0">
        <div class="h-16 flex items-center justify-center border-b border-slate-200 dark:border-slate-800">
            <div
                class="flex items-center gap-2 text-blue-600 dark:text-blue-500 font-bold tracking-tight text-sm lg:text-base">
                <i data-lucide="graduation-cap" class="w-6 h-6"></i>
                <span class="hidden xl:block">MVM Admin</span>
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto scrollbar-hide py-4 px-2 flex flex-col gap-2 items-center xl:items-stretch">
            <a href="#"
                class="flex items-center xl:justify-start justify-center gap-3 px-3 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors font-medium text-sm group">
                <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:text-blue-600 transition-colors"></i> <span
                    class="hidden xl:block">Dashboard</span>
            </a>
            <a href="#"
                class="flex items-center xl:justify-start justify-center gap-3 px-3 py-3 rounded-xl bg-blue-50 dark:bg-blue-900/20 text-blue-700 dark:text-blue-400 font-medium text-sm transition-colors">
                <i data-lucide="file-text" class="w-5 h-5"></i> <span class="hidden xl:block">Applications</span>
            </a>
            <a href="#"
                class="flex items-center xl:justify-start justify-center gap-3 px-3 py-3 rounded-xl text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800/50 transition-colors font-medium text-sm group">
                <i data-lucide="settings" class="w-5 h-5 group-hover:text-blue-600 transition-colors"></i> <span
                    class="hidden xl:block">Settings</span>
            </a>
        </nav>
    </aside>

    <main
        class="w-[90%] flex flex-col h-screen overflow-hidden bg-slate-50 dark:bg-slate-950 transition-colors duration-300">

        <header
            class="h-16 bg-white dark:bg-slate-900 border-b border-slate-200 dark:border-slate-800 flex justify-between items-center px-8 flex-shrink-0 transition-colors duration-300">
            <h1 class="font-semibold text-lg text-slate-800 dark:text-white">Live Verification</h1>
            <div class="flex items-center gap-5">
                <button class="relative text-slate-500 hover:text-blue-600 transition-colors focus:outline-none">
                    <i data-lucide="bell" class="w-5 h-5"></i>
                    <span id="notificationBadge" class="hidden absolute -top-1 -right-1 flex h-2.5 w-2.5">
                        <span
                            class="animate-ping absolute inline-flex h-full w-full rounded-full bg-red-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-red-500"></span>
                    </span>
                </button>

                <button id="theme-toggle"
                    class="p-2 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all border border-slate-200 dark:border-slate-700 focus:outline-none">
                    <i data-lucide="moon" class="w-5 h-5 text-slate-600 dark:text-slate-400 block dark:hidden"></i>
                    <i data-lucide="sun" class="w-5 h-5 text-amber-500 hidden dark:block"></i>
                </button>
                <div
                    class="w-8 h-8 rounded-full bg-blue-600 text-white flex items-center justify-center font-bold text-sm shadow-md cursor-pointer">
                    A</div>
            </div>
        </header>

        <div class="flex-1 flex flex-col p-8 overflow-hidden">
            <div class="flex justify-between items-end mb-6 flex-shrink-0">
                <div>
                    <h2 class="text-xl font-bold text-slate-900 dark:text-white">Pending Applications</h2>
                    <p class="text-sm text-slate-500 dark:text-slate-400 mt-1 hover-instruction">Hover over fields to
                        edit details.</p>
                </div>
                <button onclick="fetchData()" id="refreshBtn"
                    class="flex items-center gap-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700/50 text-slate-700 dark:text-slate-300 px-4 py-2 rounded-xl text-sm font-medium transition-all shadow-sm">
                    <i data-lucide="refresh-cw" class="w-4 h-4" id="refreshIcon"></i> Refresh
                </button>
            </div>

            <div
                class="flex-1 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-sm flex flex-col min-h-0 overflow-hidden transition-colors duration-300 relative">
                <div id="newDataAlert"
                    class="hidden flex justify-center w-full absolute top-8 left-0 z-40 pointer-events-none">
                    <button onclick="loadNewData()"
                        class="pointer-events-auto flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-2 rounded-full shadow-lg font-medium text-sm transition-transform transform translate-y-0 hover:-translate-y-1">
                        <i data-lucide="arrow-up" class="w-4 h-4"></i>
                        <span id="newDataText">1 New Application</span>
                    </button>
                </div>
                <div class="flex-1 overflow-x-auto overflow-y-auto scrollbar-hide relative">
                    <table class="w-full text-left border-collapse min-w-max">
                        <thead class="sticky top-0 z-20 bg-slate-50/95 dark:bg-slate-800/95 backdrop-blur shadow-sm">
                            <tr
                                class="border-b border-slate-200 dark:border-slate-800 text-xs uppercase tracking-wider text-slate-500 dark:text-slate-400 font-semibold">
                                <th class="px-4 py-3">Date & Time</th>
                                <th class="px-4 py-3">Application ID</th>
                                <th class="px-4 py-3">Student ID</th>
                                <th class="px-4 py-3">Student Name</th>
                                <th class="px-4 py-3">Class</th>
                                <th class="px-4 py-3">Section</th>
                                <th class="px-4 py-3">Roll No</th>
                                <th class="px-4 py-3">Date of Birth</th>
                                <th class="px-4 py-3">Father's Name</th>
                                <th class="px-4 py-3">Phone Number</th>
                                <th class="px-4 py-3 border-r border-slate-200 dark:border-slate-800">Email ID</th>
                                <th
                                    class="px-4 py-3 text-center sticky right-0 z-30 bg-slate-50/95 dark:bg-slate-800/95 backdrop-blur shadow-[-4px_0_10px_rgba(0,0,0,0.05)] w-[120px]">
                                    Action</th>
                            </tr>
                        </thead>
                        <tbody id="tableBody" class="divide-y divide-slate-200 dark:divide-slate-800 text-sm">
                            <tr>
                                <td colspan="12" class="px-4 py-12 text-center text-slate-500">Loading applications...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="confirmModal"
            class="fixed inset-0 z-[9999] hidden bg-slate-900/50 backdrop-blur-sm flex items-center justify-center opacity-0 transition-opacity duration-300">
            <div
                class="bg-white dark:bg-slate-900 rounded-2xl shadow-xl max-w-md w-full p-6 transform scale-95 transition-transform duration-300">
                <div class="flex items-center gap-4 mb-4">
                    <div id="confirmIconBox"
                        class="w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0">
                        <i id="confirmIcon" data-lucide="alert-triangle" class="w-6 h-6"></i>
                    </div>
                    <div>
                        <h3 id="confirmTitle" class="text-xl font-bold text-slate-900 dark:text-white">Confirm Action
                        </h3>
                        <p id="confirmAppId" class="text-sm font-medium text-slate-500"></p>
                    </div>
                </div>
                <p id="confirmMessage" class="text-slate-600 dark:text-slate-400 mb-6 line-height-relaxed"></p>
                <div class="flex justify-end gap-3">
                    <button onclick="closeConfirmModal()"
                        class="px-5 py-2.5 rounded-xl font-medium text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">Cancel</button>
                    <button id="confirmExecuteBtn"
                        class="px-5 py-2.5 rounded-xl font-medium text-white shadow-sm transition-colors flex items-center gap-2">
                        Confirm
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBBkITpfUjxFUFvgQhjnXedrIX4GhfCSCo",
            authDomain: "mvmn-exam-management-system.firebaseapp.com",
            databaseURL: "https://mvmn-exam-management-system-default-rtdb.asia-southeast1.firebasedatabase.app", // 🔴 ADD THIS LINE
            projectId: "mvmn-exam-management-system",
            storageBucket: "mvmn-exam-management-system.firebasestorage.app",
            messagingSenderId: "652018919071",
            appId: "1:652018919071:web:65cd8e632cda4c3f9624aa",
            measurementId: "G-CX06N7M3HX"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const pageLoadTime = Date.now();
        let newAppCount = 0;

        const notificationsRef = db.ref('notifications').orderByChild('timestamp').startAt(pageLoadTime);

        notificationsRef.on('child_added', (snapshot) => {
            const data = snapshot.val();
            showToast(`New application submitted by ${data.studentName}`, 'info');
            document.getElementById('notificationBadge').classList.remove('hidden');

            newAppCount++;
            const alertBtn = document.getElementById('newDataAlert');
            const alertText = document.getElementById('newDataText');

            alertText.innerText = `${newAppCount} New Application${newAppCount > 1 ? 's' : ''}`;
            alertBtn.classList.remove('hidden');
        });

        function loadNewData() {
            document.getElementById('newDataAlert').classList.add('hidden');
            document.getElementById('notificationBadge').classList.add('hidden');
            newAppCount = 0;
            fetchData();
        }

        // ==========================================
        // 2. GOOGLE SHEETS & DASHBOARD LOGIC
        // ==========================================
        const PENDING_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwrGuAch4Wu5cfJTQl1mVYXDdnlN7e5ep1Y7kLnGW6iFO9Q4F6WLagDAvxyahzwFdABAg/exec";
        const FINAL_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7LtjkALnF8XiE-ivVyv4Ey4r3Eeabt9A1Nn7edTf6WoI_k7hd5duyJYIQKyU6q3hnGQ/exec";
        
        // We will store the fetched array globally so we can access full row data on approve
        window.currentApplications = [];

        lucide.createIcons();

        const themeToggleBtn = document.getElementById('theme-toggle');
        themeToggleBtn.addEventListener('click', () => {
            const htmlEl = document.documentElement;
            if (htmlEl.classList.contains('dark')) {
                htmlEl.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                htmlEl.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `transform transition-all duration-300 translate-x-full opacity-0 flex items-center p-4 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-lg border-l-4 pointer-events-auto`;

            let iconName = 'info';
            let iconColorClass = 'text-blue-500';

            if (type === 'success') {
                toast.classList.add('border-l-emerald-500');
                iconName = 'check-circle';
                iconColorClass = 'text-emerald-500';
            } else if (type === 'error') {
                toast.classList.add('border-l-red-500');
                iconName = 'alert-circle';
                iconColorClass = 'text-red-500';
            } else {
                toast.classList.add('border-l-blue-500');
            }

            toast.innerHTML = `<i data-lucide="${iconName}" class="${iconColorClass} mr-3 w-5 h-5 flex-shrink-0"></i><span class="text-sm font-medium text-slate-800 dark:text-slate-200">${message}</span>`;
            container.appendChild(toast);
            lucide.createIcons({ root: toast });

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    toast.classList.remove('translate-x-full', 'opacity-0');
                });
            });

            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => { toast.remove(); }, 300);
            }, 3000);
        }

        async function fetchData() {
            const tbody = document.getElementById('tableBody');
            const refreshBtn = document.getElementById('refreshBtn');

            refreshBtn.disabled = true;
            refreshBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin text-blue-500"></i> Loading...`;
            lucide.createIcons({ root: refreshBtn });

            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();

                if (result.status === 'success') {
                    renderTable(result.data);
                    showToast('Applications loaded successfully', 'success');
                } else {
                    throw new Error(result.message);
                }
            } catch (error) {
                console.error("Fetch Error:", error);
                showToast('Failed to connect to database', 'error');
                tbody.innerHTML = `<tr><td colspan="12" class="px-4 py-8 text-center text-red-500 font-medium">Error loading data. Please check your network.</td></tr>`;
            } finally {
                refreshBtn.disabled = false;
                refreshBtn.innerHTML = `<i data-lucide="refresh-cw" class="w-4 h-4"></i> Refresh`;
                lucide.createIcons({ root: refreshBtn });
            }
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.toString().replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function editableCell(value, fieldKey, appId) {
            const safeValue = escapeHtml(value);
            return `
        <td data-field="${fieldKey}" class="px-4 py-3 whitespace-nowrap text-slate-600 dark:text-slate-300 relative group cursor-pointer hover:bg-blue-50 dark:hover:bg-slate-800 transition-colors border-r border-transparent hover:border-blue-200 dark:hover:border-slate-700"
            onclick="enableEdit(this, '${appId}', '${fieldKey}')" data-value="${safeValue}">
            <div class="flex items-center gap-3 justify-between">
                <span class="cell-text">${safeValue}</span>
                <i data-lucide="pencil" class="w-3.5 h-3.5 opacity-0 group-hover:opacity-100 transition-opacity text-blue-500"></i>
            </div>
        </td>
            `;
        }

        function renderTable(dataArray) {
            const tbody = document.getElementById('tableBody');

            if (!dataArray || dataArray.length === 0) {
                tbody.innerHTML = `<tr><td colspan="12" class="px-4 py-12 text-center text-slate-500 dark:text-slate-400"><i data-lucide="inbox" class="w-8 h-8 mb-2 opacity-50 mx-auto"></i>No pending applications found.</td></tr>`;
                lucide.createIcons();
                return;
            }

            // Remove placeholders if real data is incoming
            if (tbody.innerHTML.includes('Loading applications...') || tbody.innerHTML.includes('No pending applications')) {
                tbody.innerHTML = '';
            }

            // 🔴 CHANGED: We removed the .reverse() so it stays Oldest -> Newest
            dataArray.forEach((row) => {
                const rowId = `row-${row.applicationId}`;

                // NON-DESTRUCTIVE CHECK: If this row already exists in the HTML, SKIP IT! 
                if (document.getElementById(rowId)) return;

                const dateObj = new Date(row.timestamp);
                const timeDay = String(dateObj.getDate()).padStart(2, '0');
                const timeMonth = String(dateObj.getMonth() + 1).padStart(2, '0');
                const timeYear = dateObj.getFullYear();
                const formattedDate = `${timeDay}/${timeMonth}/${timeYear} <span class="text-slate-400 text-xs ml-1">${dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</span>`;

                const dobObj = new Date(row.dob);
                const dobDay = String(dobObj.getDate()).padStart(2, '0');
                const dobMonth = String(dobObj.getMonth() + 1).padStart(2, '0');
                const dobYear = dobObj.getFullYear();
                const formattedDOB = `${dobDay}/${dobMonth}/${dobYear}`;

                const tr = document.createElement('tr');
                tr.id = rowId;
                tr.className = "hover:bg-slate-50 dark:hover:bg-slate-800/20 transition-colors group/row";

                tr.innerHTML = `
            <td class="px-4 py-3 whitespace-nowrap text-slate-500 dark:text-slate-400 bg-white dark:bg-slate-900">${formattedDate}</td>
            <td class="px-4 py-3 whitespace-nowrap font-medium text-blue-600 dark:text-blue-400 bg-white dark:bg-slate-900">${row.applicationId}</td>
            ${editableCell(row.studentId, 'studentId', row.applicationId)}
            ${editableCell(row.studentName, 'studentName', row.applicationId)}
            ${editableCell(row.studentClass, 'studentClass', row.applicationId)}
            ${editableCell(row.section, 'section', row.applicationId)}
            ${editableCell(row.rollNo, 'rollNo', row.applicationId)}
            ${editableCell(formattedDOB, 'dob', row.applicationId)}
            ${editableCell(row.fatherName, 'fatherName', row.applicationId)}
            ${editableCell(row.phone, 'phone', row.applicationId)}
            ${editableCell(row.email, 'email', row.applicationId)}
            
            <td class="px-4 py-3 whitespace-nowrap text-center sticky right-0 z-10 bg-white dark:bg-slate-900 group-hover/row:bg-slate-50 dark:group-hover/row:bg-slate-800 shadow-[-4px_0_10px_rgba(0,0,0,0.04)] border-l border-slate-200 dark:border-slate-800">
                <div class="flex items-center justify-center gap-2">
                    <button onclick="handleAction('${row.applicationId}', 'approve')" class="p-1.5 rounded-lg bg-emerald-50 text-emerald-600 hover:bg-emerald-500 hover:text-white dark:bg-emerald-500/10 dark:hover:bg-emerald-500 dark:hover:text-white transition-all border border-emerald-200 dark:border-emerald-500/20" title="Approve">
                        <i data-lucide="check" class="w-4 h-4"></i>
                    </button>
                    <button onclick="handleAction('${row.applicationId}', 'reject')" class="p-1.5 rounded-lg bg-red-50 text-red-600 hover:bg-red-500 hover:text-white dark:bg-red-500/10 dark:hover:bg-red-500 dark:hover:text-white transition-all border border-red-200 dark:border-red-500/20" title="Reject">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </td>
        `;
                // 🔴 CHANGED: Simply append to the end of the table
                tbody.appendChild(tr);
            });

            lucide.createIcons();
        }

        function enableEdit(tdElement, appId, fieldKey) {
            if (tdElement.classList.contains('is-editing')) return;

            tdElement.classList.add('is-editing');
            tdElement.classList.remove('cursor-pointer');

            const currentValue = tdElement.getAttribute('data-value');
            const upperCaseFields = ['studentId', 'studentName', 'section', 'fatherName'];
            const textTransformClass = upperCaseFields.includes(fieldKey) ? 'uppercase' : '';

            tdElement.innerHTML = `
        <div class="flex items-center gap-1 min-w-[140px]" onclick="event.stopPropagation()">
            <input type="text" value="${currentValue}" class="w-full px-2 py-1 text-sm border border-blue-400 dark:border-blue-500 rounded bg-white dark:bg-slate-800 text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500/50 shadow-inner ${textTransformClass}">
            <button onclick="saveEdit(this, '${appId}', '${fieldKey}')" class="p-1.5 text-emerald-600 hover:bg-emerald-100 dark:hover:bg-emerald-900/50 rounded transition-colors" title="Save">
                <i data-lucide="check" class="w-4 h-4 stroke-[3]"></i>
            </button>
            <button onclick="cancelEdit(this, '${escapeHtml(currentValue)}', '${appId}', '${fieldKey}')" class="p-1.5 text-slate-400 hover:text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 rounded transition-colors" title="Cancel">
                <i data-lucide="x" class="w-4 h-4 stroke-[3]"></i>
            </button>
        </div>
            `;
            lucide.createIcons({ root: tdElement });

            const input = tdElement.querySelector('input');
            input.focus();
            input.setSelectionRange(input.value.length, input.value.length);
        }

        function cancelEdit(buttonElement, originalValue, appId, fieldKey) {
            const tdElement = buttonElement.closest('td');
            restoreCell(tdElement, originalValue, appId, fieldKey);
        }

        async function saveEdit(buttonElement, appId, fieldKey) {
            const tdElement = buttonElement.closest('td');
            const input = tdElement.querySelector('input');
            let newValue = input.value.trim();

            const upperCaseFields = ['studentId', 'studentName', 'section', 'fatherName'];
            if (upperCaseFields.includes(fieldKey)) {
                newValue = newValue.toUpperCase();
            }

            input.disabled = true;
            buttonElement.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 spin"></i>`;
            lucide.createIcons({ root: tdElement });

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'update_cell',
                        appId: appId,
                        field: fieldKey,
                        value: newValue
                    })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    showToast(`Updated successfully`, 'success');
                    restoreCell(tdElement, newValue, appId, fieldKey);

                    if (['studentClass', 'section', 'rollNo'].includes(fieldKey)) {
                        const tr = tdElement.closest('tr');
                        const classVal = String(tr.querySelector('[data-field="studentClass"]').getAttribute('data-value')).padStart(2, '0');
                        const rollVal = String(tr.querySelector('[data-field="rollNo"]').getAttribute('data-value')).padStart(2, '0');
                        const sectionVal = String(tr.querySelector('[data-field="section"]').getAttribute('data-value')).toUpperCase();

                        const sectionCode = sectionVal === 'MAHA' ? 'M' : sectionVal === 'RISHI' ? 'R' : 'N';
                        const yearShort = new Date().getFullYear().toString().slice(-2);

                        const newStudentId = `MVMN${classVal}${rollVal}${sectionCode}${yearShort}`;
                        const studentIdTd = tr.querySelector('[data-field="studentId"]');
                        const currentStudentId = studentIdTd.getAttribute('data-value');

                        if (newStudentId !== currentStudentId) {
                            restoreCell(studentIdTd, newStudentId, appId, 'studentId');
                            showToast(`Student ID auto-updated to ${newStudentId}`, 'info');

                            fetch(SCRIPT_URL, {
                                method: 'POST',
                                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                                body: JSON.stringify({
                                    action: 'update_cell',
                                    appId: appId,
                                    field: 'studentId',
                                    value: newStudentId
                                })
                            }).catch(err => console.error('Failed to save auto-generated Student ID', err));
                        }
                    }

                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                showToast('Failed to save edit', 'error');
                restoreCell(tdElement, tdElement.getAttribute('data-value'), appId, fieldKey);
            }
        }

        function restoreCell(tdElement, value, appId, fieldKey) {
            tdElement.classList.remove('is-editing');
            tdElement.classList.add('cursor-pointer');
            tdElement.setAttribute('data-value', escapeHtml(value));

            tdElement.innerHTML = `
        <div class="flex items-center gap-3 justify-between">
            <span class="cell-text">${escapeHtml(value)}</span>
            <i data-lucide="pencil" class="w-3.5 h-3.5 opacity-0 group-hover:opacity-100 transition-opacity text-blue-500"></i>
        </div>
            `;
            lucide.createIcons({ root: tdElement });
        }

        // Modal State Variables
        let pendingAction = null;
        let pendingAppId = null;

        function handleAction(appId, type) {
            pendingAction = type;
            pendingAppId = appId;

            const modal = document.getElementById('confirmModal');
            const iconBox = document.getElementById('confirmIconBox');
            const icon = document.getElementById('confirmIcon');
            const title = document.getElementById('confirmTitle');
            const msg = document.getElementById('confirmMessage');
            const btn = document.getElementById('confirmExecuteBtn');
            const appIdText = document.getElementById('confirmAppId');

            appIdText.innerText = appId;
            modal.classList.remove('hidden');

            // Trigger animation frame for smooth fade in
            requestAnimationFrame(() => {
                modal.classList.remove('opacity-0');
                modal.querySelector('div').classList.remove('scale-95');
            });

            if (type === 'approve') {
                iconBox.className = "w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600";
                icon.setAttribute('data-lucide', 'check-circle');
                title.innerText = "Approve Application";
                msg.innerText = "This will move the student to their designated Class sheet, generate their final record, and send them an email with their login credentials. This cannot be easily undone.";
                btn.className = "px-5 py-2.5 rounded-xl font-medium text-white shadow-sm transition-colors flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700";
                btn.innerHTML = `Approve Student`;
            } else {
                iconBox.className = "w-12 h-12 rounded-full flex items-center justify-center flex-shrink-0 bg-red-100 dark:bg-red-900/30 text-red-600";
                icon.setAttribute('data-lucide', 'alert-octagon');
                title.innerText = "Reject Application";
                msg.innerText = "This will permanently delete the application from the pending list and send a rejection email to the student.";
                btn.className = "px-5 py-2.5 rounded-xl font-medium text-white shadow-sm transition-colors flex items-center gap-2 bg-red-600 hover:bg-red-700";
                btn.innerHTML = `Reject Application`;
            }
            lucide.createIcons({ root: modal });
        }

        function closeConfirmModal() {
            const modal = document.getElementById('confirmModal');
            modal.classList.add('opacity-0');
            modal.querySelector('div').classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); }, 300);
        }

        // Attach click event to the confirm button
        document.getElementById('confirmExecuteBtn').addEventListener('click', async function () {
            const btn = this;
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 spin"></i> Processing...`;
            lucide.createIcons({ root: btn });

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({
                        action: 'process_application',
                        appId: pendingAppId,
                        decision: pendingAction
                    })
                });
                const result = await response.json();

                if (result.status === 'success') {
                    showToast(`Application successfully ${pendingAction}d!`, 'success');
                    closeConfirmModal();

                    // Remove the row from the HTML table smoothly
                    const rowToRemove = document.getElementById(`row-${pendingAppId}`);
                    if (rowToRemove) {
                        rowToRemove.classList.add('opacity-0', 'scale-95');
                        setTimeout(() => rowToRemove.remove(), 300);
                    }
                } else {
                    throw new Error(result.message);
                }
            } catch (err) {
                showToast(`Failed to process application.`, 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons({ root: btn });
            }
        });

        // Auto-load data when the page opens
        window.addEventListener('DOMContentLoaded', fetchData);
    </script>
</body>

</html>
